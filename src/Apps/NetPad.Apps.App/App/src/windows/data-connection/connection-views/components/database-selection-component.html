<div class="input-row">
    <div class="label-column">
        <label class="col-form-label">Databases</label>
    </div>
    <div class="input-column d-flex flex-column">
        <button class="btn btn-sm btn-secondary bg-transparent mb-2"
                click.trigger="loadDatabases()"
                disabled.bind="loadingDatabases">
            ${loadingDatabases ? 'Loading...' : 'Load Databases'}
            <span if.bind="loadingDatabases"
                  class="spinner-border spinner-border-sm text-yellow ms-2"
                  title="Loading databases..."></span>
        </button>

        <div if.bind="databasesOnServer && databasesOnServer.length" class="database-selection-list"
             style="max-height: 200px; overflow-y: auto;">
            <div class="form-check" repeat.for="dbName of databasesOnServer">
                <input class="form-check-input"
                       type="checkbox"
                       id="db-${$index}"
                       checked.bind="isDatabaseSelected(dbName)"
                       change.trigger="toggleDatabase(dbName)">
                <label class="form-check-label" for="db-${$index}">
                    ${dbName}
                </label>
            </div>
        </div>

        <div if.bind="databasesOnServer && !databasesOnServer.length" class="text-muted">
            No databases found on server.
        </div>
    </div>
</div>
